<div x-data="providerOllamaCloudStatus()" x-init="refresh()" class="space-y-4">
  <div>
    <div class="text-sm font-semibold">Ollama Cloud</div>
    <div class="text-xs opacity-70">Provider ID: ollama_cloud</div>
  </div>
  <dl class="grid gap-2 text-sm">
    <div><dt class="font-medium">Required env var</dt><dd>OLLAMA_CLOUD_API_KEY</dd></div>
    <div><dt class="font-medium">Catalog URL</dt><dd>https://ollama.com/api/tags</dd></div>
    <div><dt class="font-medium">Last model-list request status</dt><dd x-text="status"></dd></div>
    <div><dt class="font-medium">Included model count</dt><dd x-text="included"></dd></div>
    <div><dt class="font-medium">Excluded model count</dt><dd>0</dd></div>
    <div><dt class="font-medium">Excluded reasons</dt><dd>None</dd></div>
  </dl>
</div>
<script>
function providerOllamaCloudStatus() {
  return {
    status: "Not checked",
    included: 0,
    async refresh() {
      try {
        const res = await fetch("/api/plugins/_model_config/model_search", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ provider: "ollama_cloud", model_type: "chat" })
        });
        const data = await res.json();
        this.included = Array.isArray(data.models) ? data.models.length : 0;
        this.status = res.ok ? "OK" : `HTTP ${res.status}`;
      } catch (err) {
        this.status = err?.message || "Request failed";
      }
    }
  };
}
</script>
